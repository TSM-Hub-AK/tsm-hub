name: Update TSM Hub

on:
  schedule:
    # Run 1: 08:00 UTC (11:00 MSK / 16:00 HKT) — after SHFE close (15:00 CST = 07:00 UTC)
    - cron: '0 8 * * 1-5'
    # Run 2: 16:00 UTC (19:00 MSK / 00:00+1 HKT) — after LME + LBMA PM Gold fix (15:00 London)
    - cron: '0 16 * * 1-5'
  workflow_dispatch: # Manual trigger anytime

permissions:
  contents: write

# Prevent parallel runs from racing on git push
concurrency:
  group: update-hub-main
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python (for og-image generation)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow==10.4.0

      - name: Fetch LME/LBMA prices (Metals.dev)
        env:
          METALS_API_KEY: ${{ secrets.METALS_API_KEY }}
        run: node src/fetch-prices.js

      - name: Fetch Metals-API prices (Cobalt, Lithium, Mo, AA, Rare Earths, Minor Metals)
        env:
          METALS_API_COM_KEY: ${{ secrets.METALS_API_COM_KEY }}
        run: node src/fetch-metals-api.js

      - name: Fetch SHFE prices
        run: node src/fetch-shfe.js

      - name: Cross-validate prices (Metals.dev vs Metals-API.com)
        env:
          METALS_API_COM_KEY: ${{ secrets.METALS_API_COM_KEY }}
        run: node src/validate-prices.js

      - name: Fetch market news
        run: node src/fetch-news.js

      - name: Archive data (prices + news + validation)
        run: node src/archive-data.js

      - name: Commit archive to repo
        run: |
          git config user.name "TSM Hub"
          git config user.email "info@truesourcemetals.com"
          git add data/archive/ -f
          if git diff --cached --quiet; then
            echo "No new archive data"
            exit 0
          fi
          git commit -m "Archive data $(date -u +%Y-%m-%d_%H:%M)"
          # Retry push with rebase on conflict (race with concurrent runs)
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push rejected on attempt $i, rebasing and retrying..."
            git pull --rebase origin main || true
            sleep 3
          done
          echo "Push failed after 3 attempts"
          exit 1

      - name: Generate Hub page
        run: node src/generate-hub.js

      - name: Generate per-metal pages
        run: node src/generate-metal-pages.js

      - name: Copy static assets to dist
        run: |
          cp -v src/static/* dist/ 2>/dev/null || true
          # Ensure sitemap and robots from generate-hub are present
          ls -la dist/ | head -40

      - name: Generate OG image (dynamic metrics)
        run: python3 src/generate-og-image.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: tsm-hub
          directory: dist
