name: Deploy Main Site

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download main site from GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir site
          cd site
          # Download repo archive via API (works for same-owner private repos with default token)
          curl -sL -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/TSM-Hub-AK/tsm-website/tarball/main" | \
            tar xz --strip-components=1
          ls -la

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: truesource-metals
          directory: site
