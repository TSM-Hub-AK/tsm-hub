<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — TrueSource Metals Hub</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    :root {
      --font-display: 'Cabinet Grotesk', 'Helvetica Neue', sans-serif;
      --font-body: 'Satoshi', 'Inter', sans-serif;
    }

    [data-theme="dark"] {
      --color-bg: #0f1419;
      --color-surface: #161c22;
      --color-border: #2a3544;
      --color-text: #e0ddd8;
      --color-text-muted: #8a9aac;
      --color-text-faint: #566578;
      --color-primary: #2d9da5;
      --color-primary-hover: #38b8c2;
      --color-gold: #c9a84c;
    }

    [data-theme="light"] {
      --color-bg: #f5f4f0;
      --color-surface: #ffffff;
      --color-border: #d4d1ca;
      --color-text: #1a1d24;
      --color-text-muted: #5a6370;
      --color-text-faint: #8a8f98;
      --color-primary: #1a7d85;
      --color-primary-hover: #15656c;
      --color-gold: #9a7b2e;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 480px;
    }

    .error-code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 15vw, 8rem);
      font-weight: 800;
      line-height: 1;
      color: var(--color-text-faint);
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
    }

    .error-code span {
      color: var(--color-primary);
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--color-text);
    }

    .message {
      font-size: 1rem;
      color: var(--color-text-muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-family: var(--font-body);
      font-size: 0.9375rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-primary {
      background: var(--color-primary);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--color-surface);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }

    .btn-secondary:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
      transform: translateY(-1px);
    }

    .brand {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .brand-logo {
      width: 28px;
      height: 28px;
    }

    .brand-logo rect {
      opacity: 0;
      transform-origin: center;
      animation: logoAssemble 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: fill 0.4s ease;
    }

    .brand-logo rect:nth-child(1) { animation-delay: 0.1s; }
    .brand-logo rect:nth-child(2) { animation-delay: 0.2s; }
    .brand-logo rect:nth-child(3) { animation-delay: 0.3s; }
    .brand-logo rect:nth-child(4) { animation-delay: 0.4s; }

    @keyframes logoAssemble {
      0% { opacity: 0; transform: scale(0.3) rotate(-45deg); }
      60% { opacity: 1; transform: scale(1.08) rotate(3deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .brand:hover .brand-logo rect:nth-child(1),
    .brand:hover .brand-logo rect:nth-child(4) {
      fill: var(--color-gold);
    }

    .brand:hover .brand-logo rect:nth-child(2),
    .brand:hover .brand-logo rect:nth-child(3) {
      fill: var(--color-primary);
    }

    .brand-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--color-text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .brand-name span {
      color: var(--color-gold);
    }

    @media (prefers-color-scheme: light) {
      html:not([data-theme="dark"]) {
        --color-bg: #f5f4f0;
        --color-surface: #ffffff;
        --color-border: #d4d1ca;
        --color-text: #1a1d24;
        --color-text-muted: #5a6370;
        --color-text-faint: #8a8f98;
        --color-primary: #1a7d85;
        --color-primary-hover: #15656c;
        --color-gold: #9a7b2e;
      }
    }
  </style>
  <script>
    (function() {
      const saved = localStorage.getItem('tsm-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
</head>
<body>
  <div class="container">
    <div class="error-code">4<span>0</span>4</div>
    <h1>Page Not Found</h1>
    <p class="message">
      The page you're looking for doesn't exist or may have been moved.
      Try navigating back to the Hub for official metals prices, producers, and market news.
    </p>
    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6l6-4.5L14 6v7.5a1.5 1.5 0 01-1.5 1.5h-9A1.5 1.5 0 012 13.5V6z"/><path d="M6 15V8h4v7"/></svg>
        Back to Hub
      </a>
      <a href="https://truesourcemetals.com" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 8A6 6 0 112 8a6 6 0 0112 0z"/><path d="M2 8h12M8 2a9.5 9.5 0 012.5 6A9.5 9.5 0 018 14a9.5 9.5 0 01-2.5-6A9.5 9.5 0 018 2z"/></svg>
        Main Site
      </a>
    </div>
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="20" width="70" height="70" rx="8" fill="var(--color-primary)"/>
        <rect x="110" y="20" width="70" height="70" rx="8" fill="var(--color-gold)"/>
        <rect x="20" y="110" width="70" height="70" rx="8" fill="var(--color-gold)"/>
        <rect x="110" y="110" width="70" height="70" rx="8" fill="var(--color-primary)"/>
      </svg>
      <span class="brand-name">True<span>Source</span> Metals</span>
    </div>
  </div>
</body>
</html>
